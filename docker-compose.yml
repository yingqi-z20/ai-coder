services:
  ai-coder:
    image: ${IMAGE}
    container_name: ai-coder-${USERNAME}
    user: coder
    working_dir: /home/coder

    environment:
      - DOMAIN=${USERNAME}.ai-coder.thucs.cn/
      - API_KEY=${API_KEY}
      - PASSWORD=${PASSWORD}

    volumes:
      - /tools/ai-coder:/tools/ai-coder:ro
      - /data/${USERNAME}:/home/coder

    devices:
      - /dev/bus/usb:/dev/bus/usb

    ports:
      - "${PORT0}:4816"
      - "${PORT1}:8910"

    cpus: 4.0
    mem_limit: 32g
    mem_reservation: 1g

    # 如果 WebShell 或 code-server 挂了，Docker 会检测到状态异常并触发重启
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:4816 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # 日志管理：防止长期运行产生的日志占满磁盘
    logging:
      driver: "json-file"
      options:
        max-size: "1000m"
        max-file: "4"
        compress: "true" # 启用压缩，节省磁盘

    restart: unless-stopped

    # 改进的启动指令：确保两个进程都受到 wait 监控
    command: >
      sh -c " /tools/ai-coder/Backend/Backend & code-server & wait -n && exit 1 "
