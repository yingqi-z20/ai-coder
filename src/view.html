<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
    <meta content="default-src 'none'; 
               connect-src https://__DOMAIN__/api/;
               script-src 'unsafe-inline'; 
               style-src 'unsafe-inline';" http-equiv="Content-Security-Policy">
    <title>互动与聊天</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body,
        html {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f5f7;
        }

        /* 主容器：使用 Flexbox 垂直布局填满整个屏幕 */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0 auto;
            background-color: #ffffff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        /* 顶部按钮区 */
        .top-action-bar {
            padding: 12px;
            background: #ffffff;
            border-bottom: 1px solid #e5e7eb;
            z-index: 10;
        }

        .btn-section {
            margin-bottom: 10px;
        }

        .btn-section:last-child {
            margin-bottom: 0;
        }

        .btn-section-title {
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            padding-left: 2px;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .action-btn {
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 600;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
            white-space: nowrap;
        }

        .action-btn:hover {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .action-btn:active {
            opacity: 0.75;
            transform: scale(0.96);
        }

        .action-btn.vivado {
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
        }

        .action-btn.flow {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
        }

        .action-btn.tool {
            background: linear-gradient(135deg, #64748b, #475569);
        }

        .sim-time-row {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .sim-time-input {
            width: 48px;
            padding: 7px 4px;
            font-size: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
            text-align: center;
            background: #f8fafc;
        }

        .sim-time-input:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.15);
        }

        .sim-time-unit {
            font-size: 11px;
            color: #64748b;
        }

        .constraint-select {
            width: 170px;
            padding: 7px 8px;
            font-size: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
            background: #f8fafc;
            color: #334155;
        }

        .constraint-select:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.15);
        }

        .xdc-path-input {
            width: 170px;
            padding: 7px 8px;
            font-size: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
            background: #f8fafc;
        }

        .xdc-path-input:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.15);
        }

        .action-btn.doc {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }

        .manual-tcl-input {
            width: 240px;
            padding: 7px 8px;
            font-size: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
            background: #f8fafc;
        }

        .manual-tcl-input:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.15);
        }

        .top-name-input {
            width: 140px;
            padding: 7px 8px;
            font-size: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
            background: #f8fafc;
        }

        .top-name-input:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.15);
        }

        .fileset-select {
            width: 100px;
            padding: 7px 8px;
            font-size: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
            background: #f8fafc;
            color: #334155;
        }

        .fileset-select:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.15);
        }

        /* 中间聊天记录区 */
        .chat-history {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: #f4f5f7;
        }

        /* 消息气泡通用样式 */
        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        /* 机器人（后台）消息 */
        .message.bot {
            align-self: flex-start;
            background-color: #ffffff;
            color: #333333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        /* 用户消息 */
        .message.user {
            align-self: flex-end;
            background-color: #007aff;
            color: #ffffff;
            border-bottom-right-radius: 4px;
        }

        /* 系统提示消息 */
        .message.system {
            align-self: center;
            background-color: transparent;
            color: #888888;
            font-size: 12px;
            padding: 5px;
        }

        /* 底部输入区 */
        .chat-input-area {
            display: flex;
            background-color: #ffffff;
            border-top: 1px solid #ebebeb;
            gap: 10px;
            padding: 10px 15px env(safe-area-inset-bottom, 15px);
            /* 适配刘海屏底部安全区 */
        }

        .chat-input {
            flex: 1;
            padding: 10px 15px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
            resize: none;
            overflow-y: auto;
            max-height: 500px;
            vertical-align: bottom;
            box-sizing: border-box;
        }

        .chat-input:focus {
            border-color: #007aff;
        }

        .send-btn {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            background-color: #34c759;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }

        .send-btn:active {
            opacity: 0.7;
        }

        .send-btn:disabled {
            background-color: gray;
        }

        /* 新增：折叠控制按钮样式 */
        .collapse-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            font-size: 11px;
            color: #64748b;
            cursor: pointer;
            user-select: none;
            transition: color 0.15s;
            border-radius: 6px;
        }

        .collapse-toggle:hover {
            color: #0ea5e9;
            background: #f8fafc;
        }

        #collapseIcon {
            font-size: 10px;
            transition: transform 0.2s ease;
            display: inline-block;
        }

        #collapseIcon.rotated {
            transform: rotate(180deg);
        }

        .collapse-text {
            font-weight: 500;
        }

        /* .top-action-bar 支持高度过渡 */
        .top-action-bar {
            padding: 12px;
            background: #ffffff;
            border-bottom: 1px solid #e5e7eb;
            z-index: 10;

            /* 关键：用 max-height + overflow 实现动画 */
            max-height: 300px; /* 根据实际内容调整，略大于内容高度 */
            overflow: hidden;
            transition: max-height 0.3s ease, padding 0.3s ease;
        }

        /* 折叠状态 */
        .top-action-bar.collapsed {
            max-height: 40px; /* 仅保留控制按钮的高度 */
            padding: 8px 12px;
        }

        /* 折叠时隐藏按钮组，但保留控制栏 */
        .top-action-bar.collapsed .btn-section {
            display: none;
        }

        /* 确保聊天区平滑填充 */
        .chat-history {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: #f4f5f7;
            transition: padding 0.3s ease; /* 可选：折叠时调整内边距 */
        }
    </style>
</head>

<body>
<div class="app-container">
    <div class="top-action-bar">
        <div class="collapse-toggle" onclick="toggleTopBar()">
            <span id="collapseIcon">▲</span>
            <span class="collapse-text">隐藏工具栏</span>
        </div>

        <div class="btn-section">
            <div class="btn-section-title">Vivado 操作</div>
            <div class="btn-group">
                <div class="sim-time-row">
                    <button class="action-btn doc" onclick="sendConstraintAction()">打开实验文档</button>
                    <label for="constraintSelect"></label>
                    <select class="constraint-select" id="constraintSelect">
                        <option value="lab4">点亮数码管</option>
                        <option value="lab5">四位全加器</option>
                        <option value="lab6">计数器</option>
                        <option value="lab7">串行密码锁</option>
                        <option value="lab8">静态存储器访问</option>
                    </select>
                </div>
                <div class="sim-time-row">
                    <button class="action-btn vivado" onclick="createProjectAction()">创建工程</button>
                    <label for="projectNameInput"></label><input class="sim-time-input" id="projectNameInput"
                                                                 placeholder="工程名" style="width:82px;" type="text"
                                                                 value="my_project">
                </div>
                <div class="sim-time-row">
                    <button class="action-btn vivado" onclick="setTopAction()">设置顶层</button>
                    <label for="topNameInput"></label><input class="top-name-input" id="topNameInput"
                                                             placeholder="例如 tb_adder（不带 .v）" type="text" value="">
                    <label for="topFilesetSelect"></label>
                    <select class="fileset-select" id="topFilesetSelect">
                        <option value="sources_1">sources_1</option>
                        <option value="sim_1">sim_1</option>
                    </select>
                </div>
                <div class="sim-time-row">
                    <button class="action-btn vivado" onclick="sendSimAction()">仿真</button>
                    <label for="simTimeInput"></label><input class="sim-time-input" id="simTimeInput" min="1"
                                                             step="10" type="number" value="100">
                    <span class="sim-time-unit">us</span>
                </div>
                <div class="sim-time-row">
                    <button class="action-btn vivado" onclick="importConstraintAction()">导入约束</button>
                    <label for="xdcPathInput"></label><input class="xdc-path-input" id="xdcPathInput"
                                                             placeholder="lab4.xdc" type="text" value="lab4.xdc">
                </div>
                <div class="sim-time-row">
                    <button class="action-btn vivado" onclick="sendVivadoTcl('synth')">综合</button>
                    <button class="action-btn vivado" onclick="sendVivadoTcl('impl')">实现</button>
                    <button class="action-btn vivado" onclick="sendVivadoTcl('bit')">生成bit</button>
                </div>
                <div class="sim-time-row">
                    <label for="manualTclInput"></label><input class="manual-tcl-input" id="manualTclInput"
                                                               placeholder="输入 Tcl 指令，例如 report_timing_summary"
                                                               type="text" value="">
                    <button class="action-btn tool" onclick="sendManualTclAction()">执行 Tcl</button>
                </div>
            </div>
        </div>
        <div class="btn-section">
            <div class="btn-section-title">AI 辅助</div>
            <div class="btn-group">
                <button class="action-btn flow" onclick="sendFlowPrompt('code')">AI 编写代码</button>
                <button class="action-btn tool" onclick="pasteRecentConsole()">粘贴日志</button>
            </div>
        </div>
    </div>

    <div class="chat-history" id="chatHistory">
        <div class="message system">欢迎使用！你可以点击上方按钮或在下方对话。</div>
    </div>

    <div class="chat-input-area">
        <label for="messageInput"></label>
        <textarea class="chat-input" id="messageInput" placeholder="输入你的意图..." rows="2"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">发送</button>
    </div>
    <br>
</div>

<script>
    const input = document.getElementById('messageInput');

    // 实现输入框自动增高
    input.addEventListener('input', function () {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
        if (this.scrollHeight >= 500) {
            this.style.overflowY = 'auto';
        } else {
            this.style.overflowY = 'hidden';
        }
    });
    /*
    input.addEventListener('keydown', function (event) {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
        }
    });
    */

    const vscode = typeof acquireVsCodeApi === 'function'
        ? acquireVsCodeApi()
        : {
            postMessage: function () {
            }
        };

    function postToExtension(payload) {
        try {
            vscode.postMessage(payload);
        } catch (_) {
        }
    }

    function normalizeVivadoCmdBlock(raw) {
        const lines = String(raw || '').replace(/\r/g, '').split('\n');
        const cleaned = [];
        let inFence = false;
        const allowedTclPrefix = /^(if|elseif|else|foreach|for|while|switch|catch|set|puts|lappend|break|continue|return|incr|open_project|create_project|close_project|save_project_as|add_files|import_files|update_compile_order|set_property|get_property|get_filesets|get_projects|current_project|file|glob|list|llength|string|launch_simulation|open_vcd|restart|log_vcd|run|close_vcd|close_sim|reset_run|launch_runs|wait_on_run|open_run|write_bitstream)\b/i;
        const obviousNonTclPrefix = /^(module|endmodule|input|output|wire|reg|assign|initial|always|`timescale|\/\/|\/\*|\*|<__FILE_|<\/__FILE_|<__VIVADO_CMD__>|<\/__VIVADO_CMD__>)/i;

        for (const originalLine of lines) {
            let line = originalLine.replace(/\s+$/, '');
            const trimmed = line.trim();

            if (/^```/.test(trimmed)) {
                inFence = !inFence;
                continue;
            }
            if (!trimmed) {
                continue;
            }
            // Drop obvious HTML fragments accidentally mixed into command payload.
            if (/^<\s*\/?\s*[a-zA-Z][^>]*>$/.test(trimmed)) {
                continue;
            }
            if (/^Tcl\b/i.test(trimmed)) {
                continue;
            }
            if (obviousNonTclPrefix.test(trimmed)) {
                continue;
            }
            if (/^[{}]$/.test(trimmed) || /^[{}]\s*else\s*[{}]?$/.test(trimmed) || /^#/.test(trimmed)) {
                cleaned.push(line);
                continue;
            }

            // Strip markdown list prefixes like "1. " / "- ".
            line = line.replace(/^\s*\d+\.\s+/, '').replace(/^\s*-\s+/, '');
            const normalized = line.trim();
            if (!allowedTclPrefix.test(normalized) && !/^[{}]$/.test(normalized)) {
                continue;
            }

            cleaned.push(line);
        }
        return cleaned.join('\n').trim();
    }

    function insertRecentConsoleToInput(consoleText) {
        const marker = '最近Tcl Console日志：';
        const payload = consoleText ? `${marker}\n${consoleText}` : '最近没有可用日志。';

        const current = input.value || '';
        const markerIndex = current.indexOf(marker);
        let base = markerIndex >= 0 ? current.slice(0, markerIndex).trim() : current.trim();

        input.value = base ? `${base}\n\n${payload}` : payload;
        input.style.height = 'auto';
        input.style.height = (input.scrollHeight) + 'px';
    }

    const flowPrompts = {
        code: '请根据我的实验需求，编写对应的 RTL 代码、Testbench 和 XDC 约束文件。'
    };

    function buildEnsureProjectOpenTcl(projectName, bodyLines) {
        const safeProjectName = (projectName || '').trim().replace(/[^\w-]/g, '_') || 'my_project';
        const nestedProjectXprPath = `./${safeProjectName}/${safeProjectName}.xpr`;
        const flatProjectXprPath = `./${safeProjectName}.xpr`;
        const parentNestedProjectXprPath = `../${safeProjectName}/${safeProjectName}.xpr`;
        const parentFlatProjectXprPath = `../${safeProjectName}.xpr`;
        const grandParentNestedProjectXprPath = `../../${safeProjectName}/${safeProjectName}.xpr`;
        const grandParentFlatProjectXprPath = `../../${safeProjectName}.xpr`;
        const ensureOpenLines = [
            'set project_ready 0',
            'set cwd_xprs [glob -nocomplain ./*.xpr]',
            'if {[llength $cwd_xprs] != 0} {',
            '    set target_xpr [lindex $cwd_xprs 0]',
            '    if {[llength [get_projects -quiet]] != 0} {',
            '        catch {close_project}',
            '    }',
            '    if {[catch {open_project $target_xpr} open_err]} {',
            '        puts "ERROR: failed to open project in current folder: $open_err"',
            '    } else {',
            '        set project_ready 1',
            '    }',
            '}',
            'if {!$project_ready} {',
            '    if {[llength [get_projects -quiet]] != 0} {',
            `        if {[catch {save_project_as ${safeProjectName} ./${safeProjectName} -force} save_err]} {`,
            '            puts "ERROR: current project is in-memory and save_project_as failed: $save_err"',
            '        } else {',
            '            set project_ready 1',
            '        }',
            '    }',
            '}',
            'if {!$project_ready} {',
            `    set project_candidates [list "${nestedProjectXprPath}" "${flatProjectXprPath}" "${parentNestedProjectXprPath}" "${parentFlatProjectXprPath}" "${grandParentNestedProjectXprPath}" "${grandParentFlatProjectXprPath}"]`,
            '    foreach project_xpr $project_candidates {',
            '        if {$project_ready} {',
            '            break',
            '        }',
            '        if {[file exists $project_xpr]} {',
            '            if {[catch {open_project $project_xpr} open_err]} {',
            '                puts "ERROR: failed to open project: $open_err"',
            '            } else {',
            '                set project_ready 1',
            '                break',
            '            }',
            '        }',
            '    }',
            '}',
            'if {!$project_ready} {',
            '    puts "ERROR: no opened project and no .xpr found for this project name."',
            '}'
        ];
        return [
            ...ensureOpenLines,
            'if {$project_ready} {',
            ...bodyLines.map((line) => `    ${line}`),
            '}'
        ].join('\n');
    }

    const vivadoTclMap = {
        synth: [
            'reset_run synth_1',
            'launch_runs synth_1',
            'wait_on_run synth_1'
        ],
        impl: [
            'reset_run impl_1',
            'launch_runs impl_1',
            'wait_on_run impl_1'
        ],
        bit: [
            'open_run impl_1',
            'write_bitstream -force [get_property DIRECTORY [current_run]]/[get_property TOP [current_fileset]].bit'
        ]
    };

    function sendVivadoTcl(key) {
        const cmds = vivadoTclMap[key];
        if (!cmds) {
            return;
        }
        const projectName = document.getElementById('projectNameInput').value || 'my_project';
        const tclCommand = buildEnsureProjectOpenTcl(projectName, cmds);
        postToExtension(tclCommand + '\n');
        addMessage('系统', `已执行 Vivado 操作：${key}`, 'system');
    }

    function sendFlowPrompt(key) {
        const text = flowPrompts[key];
        if (!text) {
            return;
        }
        sendMessage(text);
    }

    function pasteRecentConsole() {
        postToExtension({type: 'requestRecentConsole', lines: 80});
    }

    function sendSimAction() {
        const simTime = document.getElementById('simTimeInput').value || '100';
        const projectName = document.getElementById('projectNameInput').value || 'my_project';
        const simCmds = [
            'set design_files [list]',
            'set tb_files [list]',
            'foreach f [glob -nocomplain ./*.v ./*.sv ./*.vhd ./*.vhdl] {',
            '    set fname [file tail $f]',
            '    if {[string match -nocase "tb*.v" $fname] || [string match -nocase "tb*.sv" $fname] || [string match -nocase "tb*.vhd" $fname] || [string match -nocase "tb*.vhdl" $fname] || [string match -nocase "*_tb.v" $fname] || [string match -nocase "*_tb.sv" $fname] || [string match -nocase "*_tb.vhd" $fname] || [string match -nocase "*_tb.vhdl" $fname]} {',
            '        lappend tb_files $f',
            '    } else {',
            '        lappend design_files $f',
            '    }',
            '}',
            'if {[llength $design_files] != 0} {',
            '    catch {add_files -fileset sources_1 -norecurse $design_files}',
            '}',
            'if {[llength $tb_files] != 0} {',
            '    catch {add_files -fileset sim_1 -norecurse $tb_files}',
            '}',
            'update_compile_order -fileset sources_1',
            'update_compile_order -fileset sim_1',
            'set sim_top [string trim [get_property top [get_filesets sim_1]]]',
            'if {$sim_top eq "" && [llength $tb_files] != 0} {',
            '    set tb_guess [file rootname [file tail [lindex $tb_files 0]]]',
            '    if {$tb_guess ne ""} {',
            '        catch {set_property top $tb_guess [get_filesets sim_1]}',
            '        set sim_top [string trim [get_property top [get_filesets sim_1]]]',
            '    }',
            '}',
            'if {$sim_top eq ""} {',
            '    puts "ERROR: sim_1 top is empty. Please set Testbench top first."',
            '} else {',
            '    if {[catch {launch_simulation} sim_err]} {',
            '        puts "ERROR: launch_simulation failed: $sim_err"',
            '    } else {',
            '        open_vcd',
            '        restart',
            '        log_vcd',
            `        run ${simTime}us`,
            '        close_vcd',
            '        close_sim',
            '    }',
            '}'
        ];
        const tclCommand = buildEnsureProjectOpenTcl(projectName, simCmds);
        postToExtension(tclCommand + '\n');
        addMessage('系统', `已请求行为仿真，运行时间：${simTime}us`, 'system');
    }

    function sendConstraintAction() {
        const selected = document.getElementById('constraintSelect').value || 'lab4';
        const map = {
            lab4: {
                name: '点亮数码管',
                url: 'https://lab.cs.tsinghua.edu.cn/digital-logic-lab/doc/lab4/lab4/'
            },

    function updateConstraintPathDefault() {
        const selected = document.getElementById('constraintSelect').value || 'lab4';
        const xdcPathInput = document.getElementById('xdcPathInput');
        xdcPathInput.value = `${selected}.xdc`;
    }

    function importConstraintAction() {
        const projectName = document.getElementById('projectNameInput').value || 'my_project';
        const xdcPathInput = document.getElementById('xdcPathInput');
        const xdcPath = (xdcPathInput.value || '').trim();
        if (!xdcPath) {
            addMessage('系统', '请先填写 XDC 路径，例如 ./constraints/current.xdc', 'system');
            return;
        }
        const tclLines = [
            `set xdc_path "${xdcPath}"`,
            'if {[file exists $xdc_path]} {',
            '    catch {remove_files [get_files $xdc_path]}',
            '    catch {add_files -fileset constrs_1 -norecurse $xdc_path}',
            '    update_compile_order -fileset constrs_1',
            '    puts "INFO: constraint imported: $xdc_path"',
            '} else {',
            '    puts "ERROR: xdc file not found: $xdc_path"',
            '}'
        ];
        const tclCommand = buildEnsureProjectOpenTcl(projectName, tclLines);
        postToExtension(tclCommand + '\n');
        addMessage('系统', `已请求导入约束：${xdcPath}`, 'system');
    }

    function setTopAction() {
        const projectName = document.getElementById('projectNameInput').value || 'my_project';
        const topNameInput = document.getElementById('topNameInput');
        const filesetSelect = document.getElementById('topFilesetSelect');
        const topName = (topNameInput.value || '').trim();
        const filesetName = (filesetSelect.value || 'sources_1').trim();
        if (!topName) {
            addMessage('系统', '请先填写顶层名称。', 'system');
            return;
        }

        const tclLines = [
            `set top_name "${topName}"`,
            `set target_fileset "${filesetName}"`,
            'if {[llength [get_filesets $target_fileset]] == 0} {',
            '    puts "ERROR: fileset not found: $target_fileset"',
            '} else {',
            '    set_property top $top_name [get_filesets $target_fileset]',
            '    set applied_top [get_property top [get_filesets $target_fileset]]',
            '    puts "INFO: top set for $target_fileset => $applied_top"',
            '}'
        ];
        const tclCommand = buildEnsureProjectOpenTcl(projectName, tclLines);
        postToExtension(tclCommand + '\n');
        addMessage('系统', `已请求设置顶层：${topName}（${filesetName}）`, 'system');
    }

    function sendManualTclAction() {
        const inputElement = document.getElementById('manualTclInput');
        const cmd = (inputElement.value || '').trim();
        if (!cmd) {
            addMessage('系统', '请先输入一条 Tcl 命令。', 'system');
            return;
        }
        postToExtension(cmd + '\n');
        addMessage('系统', `已发送手动 Tcl：${cmd}`, 'system');
        inputElement.value = '';
    }

    function createProjectAction() {
        const nameInput = document.getElementById('projectNameInput');
        const projectName = (nameInput.value || '').trim().replace(/[^\w-]/g, '_') || 'my_project';
        const partName = 'xc7a35tfgg484-2';
        const nestedProjectXprPath = `./${projectName}/${projectName}.xpr`;
        const flatProjectXprPath = `./${projectName}.xpr`;
        const parentNestedProjectXprPath = `../${projectName}/${projectName}.xpr`;
        const parentFlatProjectXprPath = `../${projectName}.xpr`;
        const tclCommand = [
            'if {[llength [get_projects -quiet]] != 0} {',
            '    puts "INFO: project already open."',
            '} else {',
            '    set project_opened 0',
            `    set project_candidates [list "${nestedProjectXprPath}" "${flatProjectXprPath}" "${parentNestedProjectXprPath}" "${parentFlatProjectXprPath}"]`,
            '    foreach project_xpr $project_candidates {',
            '        if {[file exists $project_xpr]} {',
            '            open_project $project_xpr',
            '            set project_opened 1',
            '            break',
            '        }',
            '    }',
            '    if {!$project_opened} {',
            `        create_project ${projectName} ./${projectName} -part ${partName}`,
            '    }',
            '}'
        ].join('\n');

        postToExtension(tclCommand + '\n');
        addMessage('系统', `已请求创建/打开工程：${projectName}（芯片：${partName}）`, 'system');
        // addMessage('系统', '提示：如果未自动切换到最新工程，请在资源管理器左侧选择“文件 -> 打开文件夹...”，打开最新工程目录。', 'system');
        setTimeout(() =>
            postToExtension({
                type: 'openFolder',
                path: `./${projectName}`
            }), 1000);
    }

    // --- 底部聊天逻辑：与 /qwen 交互 ---
    async function sendMessage(presetText) {
        const inputElement = document.getElementById('messageInput');
        const text = typeof presetText === 'string' ? presetText.trim() : inputElement.value.trim();

        if (!text) {
            return;
        } // 输入为空则不发送

        if (typeof presetText !== 'string') {
            inputElement.value = ''; // 清空输入框
            inputElement.style.height = 'auto';
        }

        // 2. 向后台发送 POST 请求
        fetch('https://__DOMAIN__/api/chat', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                "X-API-Key": __API_KEY__
            },
            body: JSON.stringify({message: text})
        }).catch((error) => {
            console.error('Chat Request Error:', error);
            addMessage('系统', `[网络错误，无法连接到 /chat]`, 'system');
        }).then((response) => {
            if (response.ok) {
                response.text().then((prid) => {
                    addMessage('系统', 'prid ' + prid, 'system');
                    addMessage('用户', text, 'user');
                }).catch(error => {
                    addMessage('用户', text, 'user');
                    addMessage('系统', `[请求错误: ${error}]`, 'system');
                });
            } else {
                addMessage('用户', text, 'user');
                addMessage('系统', `[请求失败: HTTP ${response.status}]`, 'system');
            }
        });
    }

    // 辅助功能：将消息渲染到聊天记录区
    function addMessage(sender, text, type) {
        const chatHistory = document.getElementById('chatHistory');
        if (type === 'append') {
            document.getElementById('send-btn').disabled = true;
            chatHistory.children.item(chatHistory.children.length - 1).innerHTML += text;
            return;
        }
        if (type === 'replace') {
            document.getElementById('send-btn').disabled = false;
            chatHistory.removeChild(chatHistory.childNodes.item(chatHistory.childNodes.length - 1));
            addMessage(sender, text, 'bot');
            return;
        }
        if (type !== 'user') {
            const tclRegex = /<__VIVADO_CMD__>([\s\S]*?)<\/__VIVADO_CMD__>/g;
            const commands = [...text.matchAll(tclRegex)];
            commands.forEach((command) => {
                const normalizedCmd = normalizeVivadoCmdBlock(command[1]);
                if (normalizedCmd) {
                    postToExtension(normalizedCmd + '\n');
                }
            });
        }

        const fileRegex = /<__FILE_(WRITE|APPEND)__\s+path=(.*?)\s*>([\s\S]*?)<\/__FILE_\1__>/g;
        const matches = [...text.matchAll(fileRegex)];

        for (const match of matches) {
            const type = match[1]; // WRITE 或 APPEND
            let path = match[2];
            let content = match[3];

            // 规范化路径：去除首尾空格，并处理可能存在的引号或方括号 (兼容文档中的占位符写法)
            // 例如：path=[src/index.js] 或 path="src/index.js"
            path = path.trim();
            if ((path.startsWith('[') && path.endsWith(']')) ||
                (path.startsWith('"') && path.endsWith('"')) ||
                (path.startsWith("'") && path.endsWith("'"))) {
                path = path.slice(1, -1);
            }

            if (!path) {
                return;
            }
            postToExtension({
                type: type,
                path: path,
                content: content
            });
        }

        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${type}`;
        if (type === 'user') {
            messageDiv.textContent = text
                .replace(/<__VIVADO_CMD__>[\s\S]*?<\/__VIVADO_CMD__>/g, "")
                .replace(/<__FILE_(WRITE|APPEND)__\s+path=.*?\s*>([\s\S]*?)<\/__FILE_\1__>/g, "");
            messageDiv.style.whiteSpace = "pre-line";
        } else {
            messageDiv.innerHTML = text
                .replace(/<__VIVADO_CMD__>[\s\S]*?<\/__VIVADO_CMD__>/g, "")
                .replace(/<__FILE_(WRITE|APPEND)__\s+path=.*?\s*>([\s\S]*?)<\/__FILE_\1__>/g, "");
        }

        chatHistory.appendChild(messageDiv);

        // 自动滚动到最新消息
        chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    window.addEventListener('message', (event) => {
        const payload = event.data;
        if (payload.type === 'recentConsole') {
            insertRecentConsoleToInput(payload.text || '');
            addMessage('系统', '已将最近日志粘贴到输入框。', 'system');
            return;
        }
        // const chatHistory = document.getElementById('chatHistory');
        const messageList = event.data;
        const message = messageList[messageList.length - 1];
        addMessage(message.sender, message.text, message.type);
    });
    document.getElementById('constraintSelect').addEventListener('change', updateConstraintPathDefault);
    updateConstraintPathDefault();

    // 折叠/展开功能
    function toggleTopBar() {
        const topBar = document.querySelector('.top-action-bar');
        const collapseIcon = document.getElementById('collapseIcon');
        const collapseText = document.querySelector('.collapse-text');

        topBar.classList.toggle('collapsed');

        // 更新图标和文字
        if (topBar.classList.contains('collapsed')) {
            collapseIcon.classList.add('rotated');
            collapseText.textContent = '显示工具栏';
            localStorage.setItem('topBarCollapsed', 'true');
        } else {
            collapseIcon.classList.remove('rotated');
            collapseText.textContent = '隐藏工具栏';
            localStorage.setItem('topBarCollapsed', 'false');
        }

        // 触发重排，确保滚动位置正确
        setTimeout(() => {
            const chatHistory = document.getElementById('chatHistory');
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }, 300);
    }

    // 页面加载时恢复折叠状态
    document.addEventListener('DOMContentLoaded', function () {
        const saved = localStorage.getItem('topBarCollapsed');
        if (saved === 'true') {
            toggleTopBar(); // 先切换一次到折叠状态
            // 手动修正图标状态（因为 toggle 会反转）
            document.getElementById('collapseIcon').classList.add('rotated');
            document.querySelector('.collapse-text').textContent = '显示工具栏';
        }
    });
