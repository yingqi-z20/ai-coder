<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
    <meta content="default-src 'none'; 
               connect-src https://ai-coder.thucs.cn/api/ wss://ai-coder.thucs.cn/api/; 
               script-src 'unsafe-inline'; 
               style-src 'unsafe-inline';" http-equiv="Content-Security-Policy">
    <title>互动与聊天</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body,
        html {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f5f7;
        }

        /* 主容器：使用 Flexbox 垂直布局填满整个屏幕 */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0 auto;
            background-color: #ffffff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        /* 顶部按钮区 */
        .top-action-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 15px;
            background-color: #ffffff;
            border-bottom: 1px solid #ebebeb;
            z-index: 10;
        }

        .action-btn {
            flex: 1 1 calc(50% - 10px);
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
            background-color: #007aff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .action-btn:active {
            opacity: 0.7;
        }

        .action-btn.secondary {
            background-color: #ff9500;
        }

        .action-btn.flow {
            background-color: #6366f1;
        }

        .action-btn.log {
            background-color: #64748b;
        }

        /* 中间聊天记录区 */
        .chat-history {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: #f4f5f7;
        }

        /* 消息气泡通用样式 */
        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        /* 机器人（后台）消息 */
        .message.bot {
            align-self: flex-start;
            background-color: #ffffff;
            color: #333333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        /* 用户消息 */
        .message.user {
            align-self: flex-end;
            background-color: #007aff;
            color: #ffffff;
            border-bottom-right-radius: 4px;
        }

        /* 系统提示消息 */
        .message.system {
            align-self: center;
            background-color: transparent;
            color: #888888;
            font-size: 12px;
            padding: 5px;
        }

        /* 底部输入区 */
        .chat-input-area {
            display: flex;
            background-color: #ffffff;
            border-top: 1px solid #ebebeb;
            gap: 10px;
            padding: 10px 15px env(safe-area-inset-bottom, 15px);
            /* 适配刘海屏底部安全区 */
        }

        .chat-input {
            flex: 1;
            padding: 10px 15px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
            resize: none;
            overflow-y: auto;
            max-height: 500px;
            vertical-align: bottom;
            box-sizing: border-box;
        }

        .chat-input:focus {
            border-color: #007aff;
        }

        .send-btn {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            background-color: #34c759;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }

        .send-btn:active {
            opacity: 0.7;
        }
    </style>
</head>

<body>

<div class="app-container">
    <div class="top-action-bar">
        <button class="action-btn" onclick="sendAction('1')">综合</button>
        <button class="action-btn" onclick="sendAction('2')">仿真（100us）</button>
        <button class="action-btn flow" onclick="createProjectAction()">1. 创建工程</button>
        <button class="action-btn flow" onclick="sendFlowPrompt('sim')">2. 仿真</button>
        <button class="action-btn flow" onclick="sendFlowPrompt('synth')">3. 约束+综合</button>
        <button class="action-btn flow" onclick="sendFlowPrompt('impl')">4. 实现</button>
        <button class="action-btn flow" onclick="sendFlowPrompt('bit')">5. 生成bit</button>
        <button class="action-btn log" onclick="pasteRecentConsole()">粘贴最近错误</button>
    </div>

    <div class="chat-history" id="chatHistory">
        <div class="message system">欢迎使用！你可以点击上方按钮或在下方对话。</div>
    </div>

    <div class="chat-input-area">
        <label for="messageInput">
            <textarea class="chat-input" id="messageInput" placeholder="输入你的意图..." rows="2"></textarea>
        </label>
        <button class="send-btn" onclick="sendMessage()">发送</button>
    </div>
    <br>
</div>

<script>
    const input = document.getElementById('messageInput');

    // 实现输入框自动增高
    input.addEventListener('input', function () {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
        if (this.scrollHeight >= 500) {
            this.style.overflowY = 'auto';
        } else {
            this.style.overflowY = 'hidden';
        }
    });
    input.addEventListener('keydown', function (event) {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
        }
    });

    const vscode = typeof acquireVsCodeApi === 'function'
        ? acquireVsCodeApi()
        : {postMessage: function () {}};

    function postToExtension(payload) {
        try {
            vscode.postMessage(payload);
        } catch (_) {}
    }

    function insertRecentConsoleToInput(consoleText) {
        const marker = '最近Tcl Console日志：';
        const payload = consoleText ? `${marker}\n${consoleText}` : '最近没有可用日志。';

        const current = input.value || '';
        const markerIndex = current.indexOf(marker);
        let base = markerIndex >= 0 ? current.slice(0, markerIndex).trim() : current.trim();

        input.value = base ? `${base}\n\n${payload}` : payload;
        input.style.height = 'auto';
        input.style.height = (input.scrollHeight) + 'px';
    }

    const flowPrompts = {
        rtl_tb: '请基于当前实验目标先完成 Step1：编写 RTL 和 Testbench。若需要落盘，请输出 #__FILE_BEGIN__/#__FILE_END__ 文件块。工作目录：{{WORKSPACE_DIR}}。',
        sim: '请完成 Step2：行为级仿真验证（含关键波形观测点），如需执行操作请在末尾给 Tcl 块。',
        synth: '请完成 Step3：补充或检查 XDC，并进行综合（synth_1），给出必要 Tcl。',
        impl: '请完成 Step4：实现（impl_1），并给出时序/资源检查建议与必要 Tcl。',
        bit: '请完成 Step5：生成 bitstream，并给出最小必要 Tcl 与结果检查要点。'
    };

    function sendFlowPrompt(key) {
        const text = flowPrompts[key];
        if (!text) {
            return;
        }
        sendMessage(text);
    }

    function pasteRecentConsole() {
        postToExtension({type: 'requestRecentConsole', lines: 80});
    }

    window.addEventListener('message', event => {
        const payload = event.data;
        if (!payload || payload.type !== 'recentConsole') {
            return;
        }
        insertRecentConsoleToInput(payload.text || '');
        addMessage('系统', '已将最近日志粘贴到输入框。', 'system');
    });

    // --- 顶部按钮逻辑：向 /tcl 发送 POST 请求 ---
    async function sendAction(actionType) {
        postToExtension("source /tools/action" + actionType + ".tcl\n");
        addMessage('系统', `已经发送请求 (${actionType})...`, 'system');
        return;

        try {
            const response = await fetch('https://ai-coder.thucs.cn/api/tcl', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({action: actionType})
            });

            if (response.ok) {
                // 假设后台返回 JSON 数据
                // const data = await response.json();
                addMessage('系统', `请求成功 (${actionType})`, 'system');
            } else {
                addMessage('系统', `请求失败: HTTP ${response.status}`, 'system');
            }
        } catch (error) {
            console.error('Action Request Error:', error);
            addMessage('系统', `网络错误，无法连接到 /tcl`, 'system');
        }
    }

    function createProjectAction() {
        const defaultName = 'lab_project';
        // WebView 环境下 window.prompt 可能不可用，这里优先读取输入框内容作为工程名。
        // 用法：在输入框里输入工程名，点击“1. 创建工程”即可。
        const inputElement = document.getElementById('messageInput');
        const rawInput = (inputElement.value || '').trim();
        const firstLineName = rawInput ? rawInput.split('\n')[0].trim() : defaultName;
        const projectName = (firstLineName || defaultName).replace(/[^\w-]/g, '_');
        const partName = 'xc7a35tfgg484-2';
        const tclCommand = [
            `set proj_name "${projectName}"`,
            `set part_name "${partName}"`,
            'set proj_dir [file normalize [file join [pwd] $proj_name]]',
            'create_project $proj_name $proj_dir -part $part_name -force',
            'puts "Project created: $proj_dir"'
        ].join('\n');

        inputElement.value = '';
        inputElement.style.height = 'auto';
        postToExtension(tclCommand + '\n');
        addMessage('系统', `已请求创建工程：${projectName}（芯片：${partName}）`, 'system');
    }

    // --- 底部聊天逻辑：与 /qwen 交互 ---
    async function sendMessage(presetText) {
        const inputElement = document.getElementById('messageInput');
        const text = typeof presetText === 'string' ? presetText.trim() : inputElement.value.trim();

        if (!text) {
            return;
        } // 输入为空则不发送

        // 1. 将用户消息添加到界面
        addMessage('用户', text, 'user');
        if (typeof presetText !== 'string') {
            inputElement.value = ''; // 清空输入框
            inputElement.style.height = 'auto';
        }

        // 2. 向后台发送 POST 请求
        try {
            const response = await fetch('https://ai-coder.thucs.cn/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({message: text})
            });

            if (response.ok) {
                await response.json();
            } else {
                addMessage('系统', `[请求失败: HTTP ${response.status}]`, 'system');
            }
        } catch (error) {
            console.error('Chat Request Error:', error);
            addMessage('系统', `[网络错误，无法连接到 /chat]`, 'system');
        }
    }

    // 辅助功能：将消息渲染到聊天记录区
    function addMessage(sender, text, type) {
        const tclRegex = /#__VIVADO_CMD_BEGIN__([\s\S]*?)#__VIVADO_CMD_END__/g;
        const commands = Array.from(text.matchAll(tclRegex), m => m[1]);
        commands.forEach(command => {
            postToExtension(command);
        });

        const fileRegex = /#__FILE_BEGIN__\s*path=([^\n\r]+)\r?\n([\s\S]*?)#__FILE_END__/g;
        const files = Array.from(text.matchAll(fileRegex), m => ({
            path: (m[1] || '').trim(),
            content: m[2] || ''
        }));
        files.forEach(file => {
            if (!file.path) {
                return;
            }
            postToExtension({
                type: 'writeFile',
                path: file.path,
                content: file.content
            });
        });

        const chatHistory = document.getElementById('chatHistory');
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${type}`;
        messageDiv.innerHTML = text
            .replace(/#__VIVADO_CMD_BEGIN__[\s\S]*?#__VIVADO_CMD_END__/g, "")
            .replace(/#__FILE_BEGIN__[\s\S]*?#__FILE_END__/g, "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;")
            .replace(/\n/g, "<br>");

        chatHistory.appendChild(messageDiv);

        // 自动滚动到最新消息
        chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    let chatSocket;
    chatSocket = new WebSocket('wss://ai-coder.thucs.cn/api/qwen');
    chatSocket.addEventListener('message', (event) => {
        addMessage('机器人', event.data, 'bot');
    });
    chatSocket.onclose =
        (_) => {
            addMessage('系统', `WebSocket连接已断开，请刷新页面`, 'system');
        };
</script>

</body>

</html>
