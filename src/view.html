<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
    <meta content="default-src 'none'; 
               connect-src https://ai-coder.thucs.cn/api/;
               script-src 'unsafe-inline'; 
               style-src 'unsafe-inline';" http-equiv="Content-Security-Policy">
    <title>互动与聊天</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body,
        html {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f5f7;
        }

        /* 主容器：使用 Flexbox 垂直布局填满整个屏幕 */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0 auto;
            background-color: #ffffff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        /* 顶部按钮区 */
        .top-action-bar {
            padding: 12px;
            background: #ffffff;
            border-bottom: 1px solid #e5e7eb;
            z-index: 10;
        }

        .btn-section {
            margin-bottom: 10px;
        }

        .btn-section:last-child {
            margin-bottom: 0;
        }

        .btn-section-title {
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            padding-left: 2px;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .action-btn {
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 600;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
            white-space: nowrap;
        }

        .action-btn:hover {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .action-btn:active {
            opacity: 0.75;
            transform: scale(0.96);
        }

        .action-btn.vivado {
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
        }

        .action-btn.flow {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
        }

        .action-btn.tool {
            background: linear-gradient(135deg, #64748b, #475569);
        }

        .sim-time-row {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .sim-time-input {
            width: 48px;
            padding: 7px 4px;
            font-size: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
            text-align: center;
            background: #f8fafc;
        }

        .sim-time-input:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.15);
        }

        .sim-time-unit {
            font-size: 11px;
            color: #64748b;
        }

        /* 中间聊天记录区 */
        .chat-history {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: #f4f5f7;
        }

        /* 消息气泡通用样式 */
        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        /* 机器人（后台）消息 */
        .message.bot {
            align-self: flex-start;
            background-color: #ffffff;
            color: #333333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        /* 用户消息 */
        .message.user {
            align-self: flex-end;
            background-color: #007aff;
            color: #ffffff;
            border-bottom-right-radius: 4px;
        }

        /* 系统提示消息 */
        .message.system {
            align-self: center;
            background-color: transparent;
            color: #888888;
            font-size: 12px;
            padding: 5px;
        }

        /* 底部输入区 */
        .chat-input-area {
            display: flex;
            background-color: #ffffff;
            border-top: 1px solid #ebebeb;
            gap: 10px;
            padding: 10px 15px env(safe-area-inset-bottom, 15px);
            /* 适配刘海屏底部安全区 */
        }

        .chat-input {
            flex: 1;
            padding: 10px 15px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
            resize: none;
            overflow-y: auto;
            max-height: 500px;
            vertical-align: bottom;
            box-sizing: border-box;
        }

        .chat-input:focus {
            border-color: #007aff;
        }

        .send-btn {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            background-color: #34c759;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }

        .send-btn:active {
            opacity: 0.7;
        }
    </style>
</head>

<body>

<div class="app-container">
    <div class="top-action-bar">
        <div class="btn-section">
            <div class="btn-section-title">Vivado 操作</div>
            <div class="btn-group">
                <div class="sim-time-row">
                    <button class="action-btn vivado" onclick="createProjectAction()">创建工程</button>
                    <label for="projectNameInput"></label><input class="sim-time-input" id="projectNameInput"
                                                                 placeholder="工程名" style="width:82px;"
                                                                 type="text" value="my_project">
                </div>
                <div class="sim-time-row">
                    <button class="action-btn vivado" onclick="sendSimAction()">仿真</button>
                    <label for="simTimeInput"></label><input class="sim-time-input" id="simTimeInput" min="1"
                                                             step="10" type="number" value="100">
                    <span class="sim-time-unit">us</span>
                </div>
                <button class="action-btn vivado" onclick="sendVivadoTcl('synth')">综合</button>
                <button class="action-btn vivado" onclick="sendVivadoTcl('impl')">实现</button>
                <button class="action-btn vivado" onclick="sendVivadoTcl('bit')">生成bit</button>
            </div>
        </div>
        <div class="btn-section">
            <div class="btn-section-title">AI 辅助</div>
            <div class="btn-group">
                <button class="action-btn flow" onclick="sendFlowPrompt('code')">AI 编写代码</button>
                <button class="action-btn tool" onclick="pasteRecentConsole()">粘贴日志</button>
            </div>
        </div>
    </div>

    <div class="chat-history" id="chatHistory">
        <div class="message system">欢迎使用！你可以点击上方按钮或在下方对话。</div>
    </div>

    <div class="chat-input-area">
        <label for="messageInput"></label>
        <textarea class="chat-input" id="messageInput" placeholder="输入你的意图..." rows="2"></textarea>
        <button class="send-btn" onclick="sendMessage()">发送</button>
    </div>
    <br>
</div>

<script>
    const input = document.getElementById('messageInput');

    // 实现输入框自动增高
    input.addEventListener('input', function () {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
        if (this.scrollHeight >= 500) {
            this.style.overflowY = 'auto';
        } else {
            this.style.overflowY = 'hidden';
        }
    });
    /*
    input.addEventListener('keydown', function (event) {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
        }
    });
    */

    const vscode = typeof acquireVsCodeApi === 'function'
        ? acquireVsCodeApi()
        : {
            postMessage: function () {
            }
        };

    function postToExtension(payload) {
        try {
            vscode.postMessage(payload);
        } catch (_) {
        }
    }

    function insertRecentConsoleToInput(consoleText) {
        const marker = '最近Tcl Console日志：';
        const payload = consoleText ? `${marker}\n${consoleText}` : '最近没有可用日志。';

        const current = input.value || '';
        const markerIndex = current.indexOf(marker);
        let base = markerIndex >= 0 ? current.slice(0, markerIndex).trim() : current.trim();

        input.value = base ? `${base}\n\n${payload}` : payload;
        input.style.height = 'auto';
        input.style.height = (input.scrollHeight) + 'px';
    }

    const flowPrompts = {
        code: '请根据我的实验需求，编写对应的 RTL 代码、Testbench 和 XDC 约束文件。'
    };

    const vivadoTclMap = {
        synth: [
            'reset_run synth_1',
            'launch_runs synth_1',
            'wait_on_run synth_1'
        ],
        impl: [
            'reset_run impl_1',
            'launch_runs impl_1',
            'wait_on_run impl_1'
        ],
        bit: [
            'open_run impl_1',
            'write_bitstream -force [get_property DIRECTORY [current_run]]/[get_property TOP [current_fileset]].bit'
        ]
    };

    function sendVivadoTcl(key) {
        const cmds = vivadoTclMap[key];
        if (!cmds) {
            return;
        }
        const tclCommand = cmds.join('\n');
        postToExtension(tclCommand + '\n');
        addMessage('系统', `已执行 Vivado 操作：${key}`, 'system');
    }

    function sendFlowPrompt(key) {
        const text = flowPrompts[key];
        if (!text) {
            return;
        }
        sendMessage(text);
    }

    function pasteRecentConsole() {
        postToExtension({type: 'requestRecentConsole', lines: 80});
    }

    // --- 顶部按钮逻辑：向 /tcl 发送 POST 请求 ---
    async function sendAction(actionType) {
        postToExtension("source /tools/action" + actionType + ".tcl\n");
        addMessage('系统', `已经发送请求 (${actionType})...`, 'system');
    }

    function sendSimAction() {
        const simTime = document.getElementById('simTimeInput').value || '100';
        const tclCommand = `launch_simulation -type behavioral\nrun ${simTime}us`;
        postToExtension(tclCommand + '\n');
        addMessage('系统', `已请求行为仿真，运行时间：${simTime}us`, 'system');
    }

    function createProjectAction() {
        const nameInput = document.getElementById('projectNameInput');
        const projectName = (nameInput.value || '').trim().replace(/[^\w-]/g, '_') || 'my_project';
        const partName = 'xc7a35tfgg484-2';
        const tclCommand = `create_project ${projectName} ./${projectName} -part ${partName}`;

        postToExtension(tclCommand + '\n');
        addMessage('系统', `已请求创建工程：${projectName}（芯片：${partName}）`, 'system');
    }

    // --- 底部聊天逻辑：与 /qwen 交互 ---
    async function sendMessage(presetText) {
        const inputElement = document.getElementById('messageInput');
        const text = typeof presetText === 'string' ? presetText.trim() : inputElement.value.trim();

        if (!text) {
            return;
        } // 输入为空则不发送

        // 1. 将用户消息添加到界面
        addMessage('用户', text, 'user');
        if (typeof presetText !== 'string') {
            inputElement.value = ''; // 清空输入框
            inputElement.style.height = 'auto';
        }

        // 2. 向后台发送 POST 请求
        try {
            const response = await fetch('https://ai-coder.thucs.cn/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({message: text})
            });

            if (response.ok) {
                await response.json();
            } else {
                addMessage('系统', `[请求失败: HTTP ${response.status}]`, 'system');
            }
        } catch (error) {
            console.error('Chat Request Error:', error);
            addMessage('系统', `[网络错误，无法连接到 /chat]`, 'system');
        }
    }

    // 辅助功能：将消息渲染到聊天记录区
    function addMessage(sender, text, type) {
        const chatHistory = document.getElementById('chatHistory');
        if (type === 'append') {
            chatHistory.children.item(chatHistory.children.length - 1).innerHTML += text;
            return;
        }
        if (type === 'replace') {
            chatHistory.removeChild(chatHistory.childNodes.item(chatHistory.childNodes.length - 1));
            addMessage(sender, text, 'bot');
            return;
        }
        const tclRegex = /<__VIVADO_CMD__>([\s\S]*?)<\/__VIVADO_CMD__>/g;
        const commands = [...text.matchAll(tclRegex)];
        commands.forEach((command) => {
            postToExtension(command[1]);
        });

        const fileRegex = /<__FILE_(WRITE|APPEND)__\s+path=(.*?)\s*>([\s\S]*?)<\/__FILE_\1__>/g;
        const matches = [...text.matchAll(fileRegex)];

        for (const match of matches) {
            const type = match[1]; // WRITE 或 APPEND
            let path = match[2];
            let content = match[3];

            // 规范化路径：去除首尾空格，并处理可能存在的引号或方括号 (兼容文档中的占位符写法)
            // 例如：path=[src/index.js] 或 path="src/index.js"
            path = path.trim();
            if ((path.startsWith('[') && path.endsWith(']')) ||
                (path.startsWith('"') && path.endsWith('"')) ||
                (path.startsWith("'") && path.endsWith("'"))) {
                path = path.slice(1, -1);
            }

            if (!path) {
                return;
            }
            postToExtension({
                type: type,
                path: path,
                content: content
            });
        }

        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${type}`;
        if (type === 'user') {
            messageDiv.textContent = text
                .replace(/<__VIVADO_CMD__>[\s\S]*?<\/__VIVADO_CMD__>/g, "")
                .replace(/<__FILE_(WRITE|APPEND)__\s+path=.*?\s*>([\s\S]*?)<\/__FILE_\1__>/g, "")
        } else {
            messageDiv.innerHTML = text
                .replace(/<__VIVADO_CMD__>[\s\S]*?<\/__VIVADO_CMD__>/g, "")
                .replace(/<__FILE_(WRITE|APPEND)__\s+path=.*?\s*>([\s\S]*?)<\/__FILE_\1__>/g, "")
        }

        chatHistory.appendChild(messageDiv);

        // 自动滚动到最新消息
        chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    window.addEventListener('message', (event) => {
        const payload = event.data;
        if (payload.type === 'recentConsole') {
            insertRecentConsoleToInput(payload.text || '');
            addMessage('系统', '已将最近日志粘贴到输入框。', 'system');
            return;
        }
        // const chatHistory = document.getElementById('chatHistory');
        const messageList = event.data;
        const message = messageList[messageList.length - 1];
        addMessage(message.sender, message.text, message.type);
    });
    /*
    let chatSocket;
    chatSocket = new WebSocket('wss://ai-coder.thucs.cn/api/qwen');
    chatSocket.addEventListener('message', (event) => {
        addMessage('机器人', event.data, 'bot');
    });
    chatSocket.onclose =
        (_) => {
            addMessage('系统', `WebSocket连接已断开，请刷新页面`, 'system');
        };
    */
</script>

</body>

</html>
